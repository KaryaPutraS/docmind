name: docmind_app
description: DocMind — AI-Powered Document Management Flutter Client.
publish_to: "none"
version: 3.1.0+4

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  timeago: ^3.7.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.jpg
