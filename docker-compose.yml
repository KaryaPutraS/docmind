# ============================================================
# DocMind — AI-Powered Automated Document Management System
# Stack: MinIO (S3) + PostgreSQL (pgvector) + FastAPI + Flutter
# ============================================================
version: "3.9"

services:
  # ------------------------------------------------------------------
  # MinIO — S3-compatible object storage for documents
  # ------------------------------------------------------------------
  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-26T16-02-45Z
    container_name: docmind-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # TODO(prod): Bind to 127.0.0.1 instead of 0.0.0.0 in production
    #              to avoid exposing services to the host network.
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-docmind_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-docmind_secret_change_me}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the default bucket on first startup
  minio-create-bucket:
    image: quay.io/minio/mc:latest
    container_name: docmind-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-docmind_admin} ${MINIO_ROOT_PASSWORD:-docmind_secret_change_me};
      mc mb --ignore-existing local/docmind-documents;
      mc anonymous set download local/docmind-documents;
      # NOTE: This makes ALL objects in the bucket publicly readable by
      # anyone who knows the object key. Acceptable for document storage
      # where files are meant to be shared, but review if storing PII.
      echo '>>> MinIO bucket docmind-documents ready';
      exit 0;
      "

  # ------------------------------------------------------------------
  # PostgreSQL 16 + pgvector — metadata & semantic-search engine
  # ------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"    # TODO(prod): bind to 127.0.0.1:5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmind_pg_change_me}
      POSTGRES_DB: docmind
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docmind} -d docmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # FastAPI Backend (placeholder — built from local Dockerfile)
  # ------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docmind-api
    restart: unless-stopped
    ports:
      - "8000:8000"    # TODO(prod): bind to 127.0.0.1:8000:8000, use reverse proxy
    env_file:
      - ./backend/.env
    environment:
      # Override hosts so containers can talk to each other
      MINIO_ENDPOINT: minio:9000
      POSTGRES_HOST: postgres
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      # Mount source for hot-reload in dev; remove in production
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  minio_data:
  pg_data:
