# ============================================================
# DocMind — AI-Powered Automated Document Management System
# Stack: PostgreSQL (pgvector) + FastAPI (Google Drive storage)
# ============================================================
version: "3.9"

services:
  # ------------------------------------------------------------------
  # PostgreSQL 16 + pgvector — metadata & semantic-search engine
  # ------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"    # TODO(prod): bind to 127.0.0.1:5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmind_pg_change_me}
      POSTGRES_DB: docmind
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docmind} -d docmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # FastAPI Backend
  # ------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docmind-api
    restart: unless-stopped
    ports:
      - "8001:8000"    # Bind to 8001 to avoid conflict with e-office on 8000
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - docmind_data:/app/data    # Persistent settings & runtime data (writable by non-root)
    user: "999:999"  # Match Docker volume default owner so /app/data mount is writable
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
  docmind_data:
