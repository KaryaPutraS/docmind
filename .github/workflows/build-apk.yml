# ============================================================
# DocMind — GitHub Actions: Build Flutter APK
# Trigger: manual (workflow_dispatch) atau push ke master
# ============================================================
name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Backend API base URL (e.g. https://docmind.yourdomain.com)'
        required: true
        default: 'http://10.0.2.2:8000'
        type: string
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.1'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Set API base URL
        run: |
          API_URL="${{ github.event.inputs.api_base_url || 'http://10.0.2.2:8000' }}"
          echo "BUILD_API_BASE_URL=$API_URL" >> $GITHUB_ENV
          echo "🔗 API Base URL: $API_URL"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate local.properties (Flutter SDK path for Gradle)
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionCode=4" >> android/local.properties
          echo "flutter.versionName=3.1.0" >> android/local.properties

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze Dart code
        run: flutter analyze || echo "⚠️ Analysis warnings (non-blocking)"

      - name: Build APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=${{ env.BUILD_API_BASE_URL }} \
            --target-platform android-arm64

      - name: Rename & upload debug APK
        run: |
          API_SUFFIX=$(echo "${{ env.BUILD_API_BASE_URL }}" | sed 's|[^a-zA-Z0-9]|_|g' | cut -c1-30)
          APK="docmind-debug_${API_SUFFIX}.apk"
          cp build/app/outputs/flutter-apk/app-debug.apk "$APK"
          echo "DEBUG_APK=$APK" >> $GITHUB_ENV
          echo "DEBUG_APK_PATH=frontend/$APK" >> "$GITHUB_ENV"
          echo "📦 Debug: $APK ($(du -h build/app/outputs/flutter-apk/app-debug.apk | cut -f1))"

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: docmind-apk
          path: frontend/${{ env.DEBUG_APK }}
          retention-days: 7

      - name: Show download link
        run: |
          echo "══════════════════════════════════════════════"
          echo "  ✅ BUILD SUCCESS"
          echo "  📦 APK: ${{ env.DEBUG_APK }}"
          echo "  🔗 Download from: Actions → Artifacts tab"
          echo "  ⚠️ APK ini DEBUG build — untuk testing, bukan production"
          echo "══════════════════════════════════════════════"
